# AWS-specific Fusion filesystem requirements
# For production workloads on AWS, consider instances with NVMe SSD storage
# Recommended: c5d, m5d, r5d instance families with local NVMe SSDs
kernel_version_min: "5.10"
memory_gb_min: 8
disk_gb_min: 200
disk_throughput_mbps_min: 1000
# For large production pipelines, consider 16+ vCPUs and 128+ GB memory
