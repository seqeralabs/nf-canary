# Azure-specific Fusion filesystem requirements
# For production workloads on Azure, consider VM series with local temp storage
# Recommended: D-series, E-series, or L-series VMs with local SSD storage
kernel_version_min: "5.10"
memory_gb_min: 8
disk_gb_min: 200
disk_throughput_mbps_min: 1000
# For large production pipelines, consider 16+ vCPUs and 128+ GB memory
