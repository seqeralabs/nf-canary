name: test
on:
  push:
    branches: [main]
    paths-ignore:
      - "!**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "!**/*.md"
  merge_group:
    types: [checks_requested]
    branches: [main]

# Cancel if a newer run is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install NodeJS
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier --check
        run: prettier --check .

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Run generate_report tests
        run: uv run --no-project --with "pytest==9.0.2" --with "jinja2==3.1.6" --with "humanize==4.15.0" --with "markupsafe" python -m pytest tests/ -v

  nf-test:
    runs-on: ubuntu-latest
    env:
      NXF_ANSI_LOG: false
      NXF_DISABLE_CHECK_LATEST: true
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache software installation
        id: cache-software
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: |
            /usr/local/bin/nextflow
            /usr/local/bin/nf-test
            /home/runner/.nf-test/nf-test.jar
          key: ${{ runner.os }}-software-${{ github.workspace }}

      - name: Install Nextflow
        env:
          CAPSULE_LOG: none
        if: steps.cache-software.outputs.cache-hit != 'true'
        run: |
          wget -qO- get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Install nf-test
        if: steps.cache-software.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://code.askimed.com/install/nf-test | bash
          sudo mv nf-test /usr/local/bin/
          nf-test update-plugins

      - name: Lint workflow
        run: |
          nextflow lint .

      - name: Run pipeline and cache dependencies
        run: |
          nextflow run main.nf

        # Test the module
      - name: Run nf-test
        run: |
          java -version
          nf-test test --tap=test.tap

      - uses: pcolby/tap-summary@3f74dc3bad1d527b8c1d5fa88e2f72a3adb2d9e6 # v1
        with:
          path: >-
            test.tap
